name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate tag matches pyproject version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          project_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          if [ "$version" != "$project_version" ]; then
            echo "Tag version ${version} does not match pyproject.toml version ${project_version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current version from CHANGELOG.md
          version="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$version" '
            BEGIN {
              ver_re = ver
              gsub(/[][(){}.^$*+?|\\-]/, "\\\\&", ver_re)
            }
            /^## / {
              if (found) exit
              if ($0 ~ ("^##[[:space:]]+\\[?" ver_re "\\]?([[:space:]]|$|-)")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if ! grep -q '[^[:space:]]' release_notes.md; then
            echo "No changelog entry found for version ${version} in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/* \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.md
