name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate tag matches pyproject version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          project_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          if [ "$version" != "$project_version" ]; then
            echo "Tag version ${version} does not match pyproject.toml version ${project_version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current version from CHANGELOG.md
          version="${{ steps.version.outputs.version }}"
          notes_file="${RUNNER_TEMP}/release_notes.md"
          awk -v ver="$version" '
            BEGIN {
              ver_re = ver
              gsub(/[][(){}.^$*+?|\\-]/, "\\\\&", ver_re)
            }
            /^## / {
              if (found) exit
              if ($0 ~ ("^##[[:space:]]+\\[?" ver_re "\\]?([[:space:]]|$|-)")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > "$notes_file"

          if ! grep -q '[^[:space:]]' "$notes_file"; then
            echo "No changelog entry found for version ${version} in CHANGELOG.md" >&2
            exit 1
          fi

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel and sdist
        run: uv build

      - name: Validate built distributions
        run: uvx twine check dist/*

      - name: Check PyPI pre-publish state
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/autoharness/{version}/json"

          try:
              with urllib.request.urlopen(url) as response:
                  response.read()
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"autoharness {version} not yet on PyPI.")
              else:
                  raise
          else:
              print(
                  f"autoharness {version} is already on PyPI; "
                  "publish will skip existing files on reruns."
              )
          PY

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

      - name: Smoke test published package from PyPI
        timeout-minutes: 10
        run: |
          version="${{ steps.version.outputs.version }}"
          deadline=$(( $(date +%s) + 280 ))
          while true; do
            if output="$(uv tool run --isolated --no-config --from "autoharness==${version}" autoharness version 2>/dev/null)" \
                && [ "$output" = "$version" ]; then
              home="$(uv tool run --isolated --no-config --from "autoharness==${version}" autoharness home)"
              if [ ! -d "$home/templates" ] || [ ! -d "$home/schemas" ] || [ ! -d "$home/.github/agents" ]; then
                echo "Published package is missing bundled data at $home" >&2
                exit 1
              fi
              echo "Smoke test passed for autoharness ${version} from PyPI."
              exit 0
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "--- Final attempt stderr (for diagnostics) ---" >&2
              uv tool run --isolated --no-config --from "autoharness==${version}" autoharness version 2>&1 || true
              echo "Smoke test failed: autoharness ${version} did not become resolvable from PyPI within 280 seconds." >&2
              exit 1
            fi

            echo "Waiting for autoharness ${version} to become available on PyPI..."
            sleep 10
          done

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.version.outputs.tag }}" dist/* --clobber
            gh release edit "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.tag }}" \
              --notes-file "${{ steps.changelog.outputs.notes_file }}"
          else
            gh release create "${{ steps.version.outputs.tag }}" dist/* \
              --title "${{ steps.version.outputs.tag }}" \
              --notes-file "${{ steps.changelog.outputs.notes_file }}"
          fi
