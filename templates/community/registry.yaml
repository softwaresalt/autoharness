# Community Template Registry
#
# This file catalogs curated community templates distilled from the reference
# libraries in references/. Each entry describes a template well enough for
# the install-harness and tune-harness workflows to match it against a
# workspace profile without scanning raw template content.
#
# Schema: schemas/community-template-registry.schema.json
#
# How to add an entry:
#   1. Curate a template following templates/community/README.md conventions
#   2. Place the .tmpl file in templates/community/{artifact_type}/
#   3. Add an entry below with all required fields
#   4. Validate: the template_id must be unique, applicable_profiles must have
#      at least one value, and template_path must point to an existing file
#
# The installer reads this registry during Step 1.3a (Community Template
# Selection) and presents matching templates to the operator for opt-in
# selection. Community templates are never auto-installed.

schema_version: "1.0.0"
templates:
  - template_id: adr-generator
    artifact_type: agent
    title: "ADR Generator"
    description: "Expert agent for creating comprehensive Architectural Decision Records (ADRs) with structured formatting, coded consequence tracking, alternative analysis, and quality validation. Produces well-structured ADRs with front matter, status tracking, and implementation notes."
    source_repo: awesome-copilot
    source_path: agents/adr-generator.agent.md
    license: MIT
    template_path: templates/community/agents/adr-generator.agent.md.tmpl
    applicable_profiles: [any]
    prerequisite_packs: []
    tags: [documentation, architecture, adr, decision-records]
    variables_introduced: [ADR_DIRECTORY]
    primitives_deepened: [9]

  - template_id: code-review-generic
    artifact_type: instruction
    title: "Generic Code Review Guidelines"
    description: "Comprehensive code review instructions with priority-based issue classification (critical/important/suggestion), structured comment format templates, and checklists covering code quality, security, testing, performance, architecture, and documentation. Technology-agnostic with customization points."
    source_repo: awesome-copilot
    source_path: instructions/code-review-generic.instructions.md
    license: MIT
    template_path: templates/community/instructions/code-review-generic.instructions.md.tmpl
    applicable_profiles: [any]
    prerequisite_packs: []
    tags: [code-review, quality, security, testing]
    variables_introduced: [REVIEW_LANGUAGE]
    primitives_deepened: [7]

  - template_id: agent-safety
    artifact_type: instruction
    title: "Agent Safety & Governance"
    description: "Guidelines for building safe, governed AI agent systems. Covers tool access controls (allowlists, blocklists, rate limits), content safety scanning, multi-agent trust scoring, audit logging, and common governance mistakes. Applicable when writing code that uses agent frameworks, tool-calling LLMs, or multi-agent orchestration."
    source_repo: awesome-copilot
    source_path: instructions/agent-safety.instructions.md
    license: MIT
    template_path: templates/community/instructions/agent-safety.instructions.md.tmpl
    applicable_profiles: [any]
    prerequisite_packs: []
    tags: [safety, governance, guardrails, agent-framework, audit]
    variables_introduced: []
    primitives_deepened: [5]

