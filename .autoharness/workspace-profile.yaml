# .autoharness/workspace-profile.yaml
schema_version: "1.0.0"
generated_at: "2026-05-08T09:42:00-07:00"
workspace_path: "."

languages:
  primary: "python"
  secondary:
    - "markdown"
    - "yaml"
    - "json"
  file_counts:
    py: 5
    md: 80
    yaml: 10
    json: 21

frameworks:
  list: []
  mcp_sdk: null
  mcp_transport: null

primary_stack_pack: "cli-tool"
stack_packs:
  - "cli-tool"

build:
  tool: "hatchling"
  command: "pip install -e ."

test:
  runner: "pytest"
  command: "pytest"
  directory: "tests"

lint:
  tool: ""
  command: ""

format:
  tool: ""
  command: ""

ci:
  platform: "github-actions"
  pipeline_steps:
    - "checkout"
    - "setup-python"
    - "build"
    - "release"
  quality_gates: []

structure:
  source_layout: "src/autoharness"
  test_layout: "tests"
  doc_layout: "docs"

runtime_surfaces:
  cli: true
  web_ui: false
  public_api: false
  background_jobs: false
  browser_tooling: []
  deployment_manifests: []

runtime_validation:
  validator_manifest:
    surfaces:
      - surface: "cli"
        adapter_hint: "command"
        probe_hints:
          - id: "cli-help"
            kind: "command"
            target: "autoharness --help"
            command: "uv run autoharness --help"
            url: null
            route: null
            expected_signal: "Command exits successfully and prints CLI help text"
            required: true
            evidence_types:
              - "stdout"
              - "exit-code"
            notes: "Smoke-check the packaged CLI entrypoint before treating a release as validated"
        manual_checkpoints: []
  validation_expectations:
    required: true
    surfaces_expected:
      - "cli"
    minimum_verdict: "PASS"
    preserve_invariants:
      - "The autoharness CLI starts without import, packaging, or option-parsing failures"
    release_blockers:
      - "The CLI help smoke check fails"
  releasability:
    required: false
    status_when_satisfied: "READY"
    required_evidence: []

conventions:
  code_style:
    linter: null
    formatter: null
    editor_config: false
    pre_commit: false
  git:
    branch_pattern: "feat/*, chore/*"
    commit_style: "conventional"
    pr_template: false
    merge_strategy: "merge-commit"
  documentation:
    readme: true
    changelog: false
    api_docs: false
    architecture_docs: true

distribution:
  is_global_tool: true
  global_agents_dir: ".github/agents"
  local_agents_dir: null

tools:
  markdownlint: false
  markdownlint_config: null

harness_recommendations:
  preset: "full"
  capability_packs:
    - "agent-intercom"
    - "backlogit"
    - "agent-engram"
    - "graphtor-docs"
  install_layers: []
  recommendation_reasons:
    preset:
      - "autoharness is the harness framework itself — full preset ensures all primitives are exercised"
    capability_packs:
      - item: "agent-intercom"
        because: "MCP server configured in .vscode/mcp.json"
        signals:
          - ".vscode/mcp.json"
      - item: "backlogit"
        because: "MCP server configured and .backlogit/ directory present with full config"
        signals:
          - ".vscode/mcp.json"
          - ".backlogit/config.yaml"
      - item: "agent-engram"
        because: "Engram MCP server configured in .vscode/mcp.json and .cursor/mcp.json, and .engram/ directory present"
        signals:
          - ".vscode/mcp.json"
          - ".cursor/mcp.json"
          - ".engram/config.toml"
      - item: "graphtor-docs"
        because: "graphtor-docs binary present at .graphtor/bin/graphtor-docs.exe and sources configured at .graphtor/config/sources.yaml"
        signals:
          - ".graphtor/bin/graphtor-docs.exe"
          - ".graphtor/config/sources.yaml"
    install_layers: []

agent_intercom:
  detected: true
  mcp_configured: true
  config_paths:
